services:
  sheltie:
    image: ${SHELTIE_IMAGE:-sheltie:latest}
    container_name: sheltie
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/sheltie.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - BASE_PATH=${BASE_PATH:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
